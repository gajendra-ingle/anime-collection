# .github/workflows/deploy.yml
#
# Auto-deploys the React app to Vercel on every push to `main`.
#
# Required GitHub Secrets (repo → Settings → Secrets → Actions):
#   VERCEL_TOKEN       — vercel.com → Account Settings → Tokens → Create
#   VERCEL_ORG_ID      — from .vercel/project.json  (run `vercel link` once locally)
#   VERCEL_PROJECT_ID  — from .vercel/project.json
#
# Env vars baked into the build:
#   VITE_ATLAS_APP_ID, VITE_ATLAS_API_KEY, VITE_ATLAS_DATA_SOURCE,
#   VITE_ATLAS_DATABASE, VITE_ATLAS_COLLECTION
#   → Add all of these as GitHub Secrets too so they get injected at build time.

name: Deploy → Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node setup ────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Install ───────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Build (inject Atlas env vars) ────────────────────
      - name: Build
        env:
          VITE_ATLAS_APP_ID:      ${{ secrets.VITE_ATLAS_APP_ID }}
          VITE_ATLAS_API_KEY:     ${{ secrets.VITE_ATLAS_API_KEY }}
          VITE_ATLAS_DATA_SOURCE: ${{ secrets.VITE_ATLAS_DATA_SOURCE }}
          VITE_ATLAS_DATABASE:    ${{ secrets.VITE_ATLAS_DATABASE }}
          VITE_ATLAS_COLLECTION:  ${{ secrets.VITE_ATLAS_COLLECTION }}
        run: npm run build

      # ── 5. Deploy to Vercel (production) ─────────────────────
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       '--prod'
          working-directory: .

      # ── 6. Summary ───────────────────────────────────────────
      - name: Summary
        run: |
          echo "✅ Deployed to Vercel production"
          echo "   Commit : ${{ github.sha }}"
          echo "   Actor  : ${{ github.actor }}"
