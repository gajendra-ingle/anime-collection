name: Deploy → Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_ATLAS_APP_ID:      ${{ secrets.VITE_ATLAS_APP_ID }}
          VITE_ATLAS_API_KEY:     ${{ secrets.VITE_ATLAS_API_KEY }}
          VITE_ATLAS_DATA_SOURCE: ${{ secrets.VITE_ATLAS_DATA_SOURCE }}
          VITE_ATLAS_DATABASE:    ${{ secrets.VITE_ATLAS_DATABASE }}
          VITE_ATLAS_COLLECTION:  ${{ secrets.VITE_ATLAS_COLLECTION }}
        run: npm run build

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args:       '--prod'
          working-directory: .

      - name: Summary
        run: |
          echo "✅ Deployed to Vercel production"
          echo "   Commit : ${{ github.sha }}"
          echo "   Actor  : ${{ github.actor }}"
